<!DOCTYPE html>
<html>
<head><title>Chassis Game Mechanics</title></head>
<body>
  <h1>Chassis Game Mechanics</h1>
  <h2>Comfort Rating</h2>
  <p>Comfort_Rating = Slider_Comfort * 0.8 + Selected_Chassis_Comfort</p>
  <h2>Performance Rating</h2>
  <p>Performance_Rating = Slider_Performance * 1.2</p>
  <h2>Overall Rating</h2>
  <p>Overall_Rating = Comfort_Rating + Performance_Rating</p>
  <table>
    <tr>
      <th>Variable</th><th>Description</th>
    </tr>
    <tr>
      <td>Slider_Comfort</td><td>Comfort slider value</td>
    </tr>
  </table>
</body>
</html>
